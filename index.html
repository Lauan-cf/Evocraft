<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoMine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="ChatGPT Image 2 de jul. de 2026, 19_45_22.png" type="image/x-icon">
    <style>
        body
        {
            display: flex;
            justify-content: center;
        }
        section
        {
            display: flex;
            position: absolute;
            top: 150px;
            gap: 70px;
            justify-items: center;
            right: 25%;
            left: 38%;
            transform: translateZ(-50%);
        }
        img
        {
            height: 24vw;
            width: 24vw;
        }
        img:hover
        {
            height: 25vw;
            width: 25vw;
            animation: animarLuzes 3s ease-in-out infinite;
        }
        h1
        {
            text-align: center;
            font-size: clamp(35px, 2vw, 4em);
            margin-top: 100px;
            
            color: green;

        }
        @keyframes animarContorno
        {
            0%
            {
                -webkit-text-stroke: 2px rgb(255, 0, 0);
                color: rgb(0, 255, 85);
            }
            50%
            {
                -webkit-text-stroke: 2px rgb(0, 255, 85);
                color: red;
            }
            75%
            {
                -webkit-text-stroke: 2px rgb(17, 0, 255);
                color: rgb(217, 255, 0);
            }
            100%
            {
                -webkit-text-stroke: 2px rgb(255, 0, 0);
                color: rgb(0, 255, 85);
            }
            
        }
        @keyframes animarLuzes
        {
            0%
            {
                background: radial-gradient(circle, #ffffff 0%, #ff00aa 60%);
                box-shadow: 
                0 0 25px 5px #ff00aa,
                0 0 60px 25px #ff00aa,
                0 0 200px 100px rgba(255, 0, 170, 0.8);
                -webkit-text-stroke: 2px #ff00aa;
            }
            25%
            {
                background: radial-gradient(circle, #ffffff 0%, #9d00ff 60%);
                box-shadow: 0 0 25px 5px #9d00ff, 0 0 60px 25px #9d00ff, 0 0 200px 100px #9d00ffcc;
                -webkit-text-stroke: 2px #9d00ff;
            }
            50%
            {
                background: radial-gradient(circle, #ffffff 0%, #ff1a40 60%);
                box-shadow: 0 0 25px 5px #ff1a40,  
                0 0 60px 25px #ff003c,      
                0 0 200px 100px #ff003ccc;
                -webkit-text-stroke: 2px #ff1a40;
            }
            75%
            {
                background: radial-gradient(circle, #ffffff 0%, #ffea00 60%);
                box-shadow: 0 0 25px 5px #ffea00, 0 0 60px 25px #ffea00, 0 0 200px 100px rgba(255, 234, 0, 0.8);
                -webkit-text-stroke: 2px #ffea00;
            }
            100%
            {
                background: radial-gradient(circle, #ffffff 0%, #ff00aa 60%);
                box-shadow: 
                0 0 25px 5px #ff00aa,
                0 0 60px 25px #ff00aa,
                0 0 200px 100px rgba(255, 0, 170, 0.8);
                -webkit-text-stroke: 2px #ff00aa;
            }
        }
        .rosa, .vermelho, .roxo, .amarelo
        {
            animation: animarLuzes 3s ease-in-out infinite; 
        }
        .requisito a:hover + .re h1,
        .requisito a:hover + .re p,
        .requisito a:hover + .re ul 
        {
            color: rgb(255, 187, 0);
            transition: 0.8s ease;
            -webkit-text-stroke: 1px rgb(87, 0, 87);
            animation: animarLuzes 3s ease-in-out infinite;
            transition: animation 1s ease;
        }
        
    </style>
</head>
<body>
    <div class="amarelo"></div>
    <div class="vermelho"></div>
    <div class="roxo"></div>
    <div class="rosa"></div>
    <section>
        <div class="requisito">
            <a href="Crafting do Avaritia.html"><img src="imagens/avaritia.jfif" alt=""></a>
            <div class="re">
                <h1>Avaritia</h1>
            </div>
        </div>
    </section>
    
   
</body>
</html>
